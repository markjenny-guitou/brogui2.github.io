<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/photos.css">
</head>
<body>
    <nav>
        <div class="nav-container">
            <div class="nav-logo">我的生活点滴</div>
            <ul class="nav-menu">
                <li><a href="index.html">首页</a></li>
                <li><a href="photos.html" style="color: #3182ce; font-weight: bold;">个人帅照</a></li>
                <li><a href="stories.html">个人趣事</a></li>
                <li><a href="complaints.html">个人牢骚</a></li>
                <li><a href="memories.html">女神回忆录</a></li>
            </ul>
        </div>
    </nav>

    <main class="photos-main">
        <!-- 页面标题区 -->
        <div class="photos-header">
            <h1>我的帅照合集</h1>
            <p>记录青春里的每一个美好瞬间 ✨</p>
        </div>

        <!-- 照片网格展示区（4张照片） -->
        <div class="photos-grid">
            <!-- 照片1 -->
            <div class="photo-card">
                <img src="images/2.jpg" alt="帅照1" class="photo-img">
                <div class="photo-desc">
                    <h3>鬼头贴</h3>
                    <p>起床，别过少爷生活</p>
                </div>
            </div>
            <!-- 照片2 -->
            <div class="photo-card">
                <img src="images/1.jpg" alt="帅照2" class="photo-img">
                <div class="photo-desc">
                    <h3>伪军这一块</h3>
                    <p>芒种之八路军大反抗</p>
                </div>
            </div>
            <!-- 照片3 -->
            <div class="photo-card">
                <img src="images/4.jpg" alt="帅照3" class="photo-img">
                <div class="photo-desc">
                    <h3>乒乓球</h3>
                    <p>鬼少决胜局打心脏2：0绵实</p>
                </div>
            </div>
            <!-- 新增照片4 -->
            <div class="photo-card">
                <img src="images/3.jpg" alt="帅照4" class="photo-img">
                <div class="photo-desc">
                    <h3>西岭游</h3>
                    <p>17度看雪的来了</p>
                </div>
            </div>
        </div>

        <!-- 新增：照片故事/心情板块（丰富底部） -->
        <div class="photo-story-section">
            <h2 class="story-title">照片里的小心情</h2>
            <div class="story-content">
                <p>虽然丑，但是真的丑的牛逼也是一种天赋</p>
                <p>帅照经不起时间，猎奇却刻骨铭心</p>
            </div>
            <!-- 新增：趣味标签云 -->
            <div class="tag-cloud">
                <span class="tag">青春</span>
                <span class="tag">校园</span>
                <span class="tag">带土</span>
                <span class="tag">火影</span>
                <span class="tag">佐助</span>
                <span class="tag">日常</span>
            </div>
        </div>

        <!-- 返回首页按钮 -->
        <div class="back-btn-container">
            <a href="index.html" class="back-btn">← 返回首页</a>
        </div>
    </main>

    <footer>
        <p>© 2026 嘻嘻 | 要不是还搞不来后端，高低整个充值入口</p>
    </footer>
